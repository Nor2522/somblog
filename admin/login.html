<!DOCTYPE html>
<html lang="so">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      var saved = null;
      try { saved = localStorage.getItem('somblog-theme'); } catch (e) {}
      var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - SomBlog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="login-shell">
    <button class="icon-btn" data-theme-toggle type="button"></button>
    <div class="login-card">
      <h1>Som<span class="wordmark-accent">Blog</span></h1>
      <p class="sub">Sign in to manage posts</p>

      <form id="login-form">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn full">Sign in</button>
        <div id="form-msg"></div>
      </form>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
