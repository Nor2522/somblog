<!DOCTYPE html>
<html lang="so">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      var saved = null;
      try { saved = localStorage.getItem('somblog-theme'); } catch (e) {}
      var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - SomBlog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a href="../index.html" class="wordmark">Som<span>Blog</span></a>
      <nav class="site-nav">
        <span id="admin-username"></span>
        <a href="#" id="logout-link">Log out</a>
        <button class="icon-btn" data-theme-toggle type="button"></button>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div class="dash-header">
      <h1>Posts</h1>
    </div>

    <div class="dash-toolbar">
      <button class="btn" id="new-post-btn" type="button">+ New post</button>
    </div>

    <section class="editor-panel hidden" id="editor-panel">
      <h2 id="editor-title">New post</h2>
      <form id="post-form">
        <input type="hidden" id="post-id" />

        <div class="field">
          <label for="title">Title</label>
          <input type="text" id="title" required />
        </div>

        <div class="field-row">
          <div class="field">
            <label for="category">Category</label>
            <input type="text" id="category" placeholder="e.g. Wararka" />
          </div>
          <div class="field">
            <label for="tags">Tags (comma separated)</label>
            <input type="text" id="tags" placeholder="e.g. tiknoolajiyada, dhaqan" />
          </div>
        </div>

        <div class="field">
          <label for="excerpt">Excerpt (short summary)</label>
          <input type="text" id="excerpt" placeholder="One or two sentences for the post list" />
        </div>

        <div class="field">
          <label for="coverImage">Cover image URL (optional)</label>
          <input type="text" id="coverImage" placeholder="https://..." />
        </div>

        <div class="field">
          <label for="content">Content</label>
          <textarea id="content" required placeholder="Write the post here. Leave a blank line between paragraphs."></textarea>
        </div>

        <div class="checkbox-field">
          <input type="checkbox" id="published" checked />
          <label for="published" style="margin: 0;">Published (visible to visitors)</label>
        </div>

        <div class="editor-actions">
          <button type="submit" class="btn" id="save-btn">Save post</button>
          <button type="button" class="btn secondary" id="cancel-btn">Cancel</button>
        </div>
        <div id="editor-msg"></div>
      </form>
    </section>

    <div id="table-container">
      <p class="loading-state">Loading posts...</p>
    </div>
  </main>

  <script src="../js/utils.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
