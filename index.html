<!DOCTYPE html>
<html lang="so">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SomBlog</title>
  <meta name="description" content="SomBlog - qoraallo iyo maqaallo cusub." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a href="/" class="wordmark">Som<span>Blog</span></a>
      <nav class="site-nav">
        <a href="/">Home</a>
        <a href="/admin/login.html">Admin</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div class="controls">
      <input type="search" id="search-input" placeholder="Search posts..." />
      <select id="category-select">
        <option value="">All categories</option>
      </select>
      <button id="search-btn" type="button">Search</button>
    </div>

    <div id="posts-container">
      <p class="loading-state">Loading posts...</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">SomBlog</div>
  </footer>

  <script src="/js/main.js"></script>
</body>
</html>
